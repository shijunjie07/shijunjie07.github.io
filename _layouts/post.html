---
layout: default
---
<article class="post section-shell">
  <header class="post-header">
    <a class="back-link" href="{{ '/blog/' | relative_url }}">← Blog</a>
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.summary %}
      <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
