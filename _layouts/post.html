---
layout: default
---
<article class="post">
  <header class="post-header">
    <p class="post-date">{{ page.date | date: "%B %-d, %Y" }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.categories and page.categories.size > 0 %}
      <div class="tag-list" aria-label="Categories">
        {% for category in page.categories %}
          <span>{{ category }}</span>
        {% endfor %}
      </div>
    {% endif %}
    {% if page.summary %}
      <p class="post-summary">{{ page.summary }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <p class="post-back"><a href="{{ '/blog/' | relative_url }}">Back to Blog</a></p>
</article>
